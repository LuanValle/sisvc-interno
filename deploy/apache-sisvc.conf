# /etc/httpd/conf.d/sisvc.conf
# Exemplo de Apache como reverse proxy para o Node em 127.0.0.1:3000
<VirtualHost *:80>
    ServerName app.example.com

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/ connectiontimeout=5 timeout=60 retry=0
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog /var/log/httpd/sisvc_error.log
    CustomLog /var/log/httpd/sisvc_access.log combined
</VirtualHost>
